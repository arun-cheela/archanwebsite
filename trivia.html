<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Well Do You Know Archan?</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --line:#d2d2d7; --text:#1d1d1f; --muted:#6e6e73;
    --accent:#0071e3; --green:#34c759; --red:#ff3b30;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;-webkit-font-smoothing:antialiased}
  .wrap{width:100%;max-width:540px}
  .card{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:22px;padding:34px 28px;
    box-shadow:0 14px 50px rgba(0,0,0,.08)}

  .back{position:fixed;top:14px;left:14px;display:none;z-index:50;background:rgba(255,255,255,.8);
    backdrop-filter:saturate(180%) blur(14px);color:var(--text);text-decoration:none;padding:8px 15px;
    border-radius:980px;font-size:.82rem;font-weight:600;border:1px solid rgba(0,0,0,.1)}

  /* start / end screens */
  .center{text-align:center}
  h1{font-size:2rem;font-weight:600;letter-spacing:-.03em;line-height:1.12}
  .sub{color:var(--muted);margin:14px 0 26px;font-size:1.05rem;font-weight:400}
  .btn{display:inline-block;background:var(--accent);color:#fff;border:none;cursor:pointer;
    padding:13px 28px;border-radius:980px;font-size:1rem;font-weight:500;transition:background .2s}
  .btn:hover{background:#0077ed}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--accent)}

  /* quiz */
  .bar{height:5px;background:#e8e8ed;border-radius:6px;overflow:hidden;margin-bottom:20px}
  .bar i{display:block;height:100%;background:var(--accent);transition:width .3s;border-radius:6px}
  .qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:.82rem;margin-bottom:12px;font-weight:500}
  .q{font-size:1.35rem;font-weight:600;letter-spacing:-.01em;margin-bottom:22px;line-height:1.3}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{text-align:left;background:#f5f5f7;border:1px solid transparent;color:var(--text);
    padding:15px 16px;border-radius:14px;cursor:pointer;font-size:1rem;transition:.14s;display:flex;align-items:center;gap:12px}
  .opt:hover{background:#ececef}
  .opt .k{width:26px;height:26px;border-radius:7px;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:var(--muted);flex:none}
  .opt.correct{background:rgba(52,199,89,.14);border-color:var(--green)}
  .opt.wrong{background:rgba(255,59,48,.12);border-color:var(--red)}
  .opt.correct .k{background:var(--green);color:#fff;border-color:transparent}
  .opt.wrong .k{background:var(--red);color:#fff;border-color:transparent}
  .opt:disabled{cursor:default}
  .next{margin-top:20px;width:100%;display:none}

  .scorebig{font-size:3.6rem;font-weight:700;letter-spacing:-.03em;color:var(--accent);margin:6px 0}
  .ring{font-size:2.8rem;margin-bottom:8px}
</style>
</head>
<body>
<a href="games.html" target="_top" id="back" class="back">← Back to site</a>

<div class="wrap">
  <!-- START -->
  <div class="card center" id="start">
    <div class="ring">🧠</div>
    <h1>How Well Do You Know Archan?</h1>
    <p class="sub">A quick quiz about me — my games, my favourites, and more. Can you get them all right?</p>
    <button class="btn" id="startBtn">Start Quiz →</button>
  </div>

  <!-- QUIZ -->
  <div class="card" id="quiz" style="display:none">
    <div class="bar"><i id="prog"></i></div>
    <div class="qmeta"><span id="qnum">Question 1</span><span id="scoreNow">Score: 0</span></div>
    <div class="q" id="qtext"></div>
    <div class="opts" id="opts"></div>
    <button class="btn next" id="nextBtn">Next →</button>
  </div>

  <!-- END -->
  <div class="card center" id="end" style="display:none">
    <div class="ring" id="endEmoji">🎉</div>
    <h1 id="endTitle">Nice!</h1>
    <div class="scorebig"><span id="finalScore">0</span>/<span id="finalTotal">0</span></div>
    <p class="sub" id="endMsg"></p>
    <button class="btn" id="againBtn">Play Again</button>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   ABOUT-ARCHAN TRIVIA
   To add/edit questions: change the QUESTIONS list below.
   Each question = { q:"the question", options:[...], answer: index_of_correct (0-based) }
   Questions marked  // EDIT  use placeholder answers — tell Claude your real
   answer and it'll be filled in.
   ============================================================ */
const QUESTIONS=[
  { q:"How old is Archan?",
    options:["11","12","13","15"], answer:2 },

  { q:"What is Archan's favourite F1 team?",
    options:["Ferrari","Red Bull","Mercedes","McLaren"], answer:1 },

  { q:"What is Archan's favourite food?",
    options:["Pizza","Burger","Pasta","Biryani"], answer:0 },

  { q:"What is Archan's favourite colour?",
    options:["Blue","Red","Green","Black"], answer:0 },

  { q:"Who is Archan's favourite cricketer?",
    options:["Sanju Samson","Virat Kohli","Rohit Sharma","MS Dhoni"], answer:0 },

  { q:"What is Archan's favourite IPL team?",
    options:["RR","CSK","MI","RCB"], answer:0 },

  { q:"What is Archan's favourite hobby?",
    options:["Playing with friends","Reading","Drawing","Singing"], answer:0 },

  { q:"What is Archan's favourite movie?",
    options:["Home Alone","Frozen","Cars","Toy Story"], answer:0 },

  { q:"What is Archan's favourite sport to play?",
    options:["Football","Cricket","Tennis","Basketball"], answer:0 },

  { q:"Who is Archan's favourite footballer?",
    options:["Lionel Messi","Cristiano Ronaldo","Neymar","Kylian Mbappé"], answer:0 },
];

const $=id=>document.getElementById(id);
let idx=0, score=0, answered=false;

function startQuiz(){ idx=0; score=0; answered=false;
  $('start').style.display='none'; $('end').style.display='none';
  $('quiz').style.display='block'; showQ(); }

function showQ(){
  answered=false;
  const item=QUESTIONS[idx];
  $('qnum').textContent='Question '+(idx+1)+' of '+QUESTIONS.length;
  $('scoreNow').textContent='Score: '+score;
  $('prog').style.width=((idx)/QUESTIONS.length*100)+'%';
  $('qtext').textContent=item.q;
  const opts=$('opts'); opts.innerHTML='';
  const letters=['A','B','C','D','E'];
  item.options.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='opt';
    b.innerHTML='<span class="k">'+letters[i]+'</span><span>'+o+'</span>';
    b.addEventListener('click',()=>choose(i,b));
    opts.appendChild(b);
  });
  $('nextBtn').style.display='none';
}

function choose(i,btn){
  if(answered) return;
  answered=true;
  const item=QUESTIONS[idx];
  const buttons=$('opts').querySelectorAll('.opt');
  buttons.forEach((b,bi)=>{
    b.disabled=true;
    if(bi===item.answer) b.classList.add('correct');
    else if(bi===i) b.classList.add('wrong');
  });
  if(i===item.answer){ score++; $('scoreNow').textContent='Score: '+score; }
  $('prog').style.width=((idx+1)/QUESTIONS.length*100)+'%';
  $('nextBtn').textContent = (idx===QUESTIONS.length-1)?'See Result →':'Next →';
  $('nextBtn').style.display='block';
}

$('nextBtn').addEventListener('click',()=>{
  if(idx<QUESTIONS.length-1){ idx++; showQ(); }
  else finish();
});

function finish(){
  $('quiz').style.display='none'; $('end').style.display='block';
  $('finalScore').textContent=score; $('finalTotal').textContent=QUESTIONS.length;
  const pct=score/QUESTIONS.length;
  let emoji,title,msg;
  if(pct===1){ emoji='🏆'; title='Perfect Score!'; msg='You know Archan better than anyone!'; }
  else if(pct>=0.7){ emoji='🌟'; title='Awesome!'; msg='You really know your stuff.'; }
  else if(pct>=0.4){ emoji='🙂'; title='Not bad!'; msg='You know a fair bit about Archan.'; }
  else { emoji='🤔'; title='Hmm…'; msg='Time to get to know Archan a little more!'; }
  $('endEmoji').textContent=emoji; $('endTitle').textContent=title; $('endMsg').textContent=msg;
}

$('startBtn').addEventListener('click',startQuiz);
$('againBtn').addEventListener('click',startQuiz);

// show back button only when opened full-screen (not inside the games-page iframe)
if(window.self===window.top){ $('back').style.display='block'; }
</script>
</body>
</html>
