<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Archan</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav"><div class="nav-inner">
  <a class="brand" href="index.html">Archan</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="games.html">Games</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</div></header>

<main>
  <section class="section">
    <h2 class="h">Get in touch</h2>
    <p class="lead">Have a question, a game idea, or just want to say hi?</p>

    <div class="contact-card">
      <h3 style="font-size:1.5rem;font-weight:600;letter-spacing:-.01em">Let's talk</h3>
      <div style="margin-top:18px">
        <button class="btn" id="emailBtn">Email me</button>
        <a class="btn ghost" href="#">My channel</a>
      </div>
      <p class="note">Tip: always check with a parent before sharing any personal information online.</p>
    </div>
  </section>
</main>

<footer><div class="foot-inner"><span>© 2026 Archan</span><span>Built for fun.</span></div></footer>

<script>
  document.getElementById('emailBtn').addEventListener('click', function(){
    var from = prompt("What's your email address? (so Archan can reply to you)");
    if(from === null) return;                 // visitor pressed Cancel
    from = from.trim();
    var to = 'archancheela24@gmail.com';
    var subject = encodeURIComponent('Hi Archan — a message from your website');
    var body = encodeURIComponent('From: ' + (from || '(not given)') + '\n\nMy message:\n');
    window.location.href = 'mailto:' + to + '?subject=' + subject + '&body=' + body;
  });
</script>
</body>
</html>
